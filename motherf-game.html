<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MF Field - 22nd Birthday Edition</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', 'Hiragino Kaku Gothic ProN', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        #game-wrapper {
            position: relative;
            max-width: 100vw;
            max-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #game-container {
            position: relative;
            box-shadow: 0 0 100px rgba(0,0,0,1);
            border: 4px solid #333;
            background-color: #1a1a1a;
            overflow: hidden;
            aspect-ratio: 1400 / 1050;
            width: 100%;
            height: auto;
            background-image: radial-gradient(circle at center, #222 0%, #111 100%);
        }

        /* スワイプ時のブラウザ挙動を防ぐため touch-action を追加 */
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none; 
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 1400px;
            height: 1050px;
            pointer-events: none;
            transform-origin: top left;
        }

        /* ボタンの位置を画面上部に変更 */
        .phase-btn {
            position: absolute;
            right: 40px;
            top: 30px; 
            padding: 15px 35px;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 22px;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 8px 25px rgba(231, 76, 60, 0.4);
            transition: all 0.2s;
            z-index: 10;
        }
        .phase-btn:hover { transform: scale(1.05); filter: brightness(1.2); }
        .phase-btn:disabled { background: #444; cursor: not-allowed; box-shadow: none; }

        #zukanBtn {
            position: absolute;
            left: 40px;
            top: 30px;
            padding: 15px 35px;
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 22px;
            cursor: pointer;
            pointer-events: auto;
            box-shadow: 0 8px 25px rgba(52, 152, 219, 0.4);
            transition: all 0.2s;
            z-index: 10;
        }
        #zukanBtn:hover { transform: scale(1.05); filter: brightness(1.2); }

        #actionConfirmBtn {
            position: absolute;
            bottom: 230px; 
            left: 50%;
            transform: translateX(-50%);
            padding: 20px 70px;
            background: #2ecc71;
            color: white;
            border: 3px solid #fff;
            border-radius: 50px;
            font-weight: bold;
            font-size: 28px;
            cursor: pointer;
            pointer-events: auto;
            display: none;
            z-index: 150;
            box-shadow: 0 0 40px rgba(46, 204, 113, 0.6);
            transition: transform 0.2s;
        }
        #actionConfirmBtn:hover { transform: translateX(-50%) scale(1.05); }
        #actionConfirmBtn:disabled { background: #555; border-color: #333; cursor: not-allowed; box-shadow: none; }

        .log-container {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 1100px;
            height: 80px;
            background: rgba(0, 0, 0, 0.9);
            border-radius: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 24px;
            font-weight: bold;
            color: #fff;
            pointer-events: none;
            border: 3px solid #f1c40f;
            z-index: 50;
            text-align: center;
            padding: 0 40px;
            box-shadow: 0 0 30px rgba(241, 196, 15, 0.4);
        }

        .modal-base {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(20, 20, 20, 0.98);
            border-radius: 30px;
            padding: 50px;
            pointer-events: auto;
            display: none;
            flex-direction: column;
            align-items: center;
            z-index: 100;
        }

        #negotiation-modal { width: 850px; border: 5px solid #f1c40f; }
        #iv-modal { width: 600px; border: 5px solid #e74c3c; z-index: 200; }
        
        #zukan-modal { width: 1000px; height: 800px; border: 5px solid #3498db; z-index: 300; padding: 30px; }

        .neg-buttons { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; width: 100%; margin-top: 30px; }
        .neg-btn { padding: 20px; border: none; color: white; border-radius: 15px; cursor: pointer; font-weight: bold; font-size: 20px; transition: transform 0.1s; }
        .neg-btn:hover { transform: scale(1.05); }

        #event-overlay, #result-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none; justify-content: center; align-items: center; flex-direction: column;
            pointer-events: auto;
        }
        #event-overlay { background: rgba(41, 128, 185, 0.85); z-index: 200; }
        #result-overlay { background: rgba(0, 0, 0, 0.9); z-index: 500; }
        
        .event-title { font-size: 64px; color: #fff; text-shadow: 0 0 30px #2980b9; font-weight: bold; margin-bottom: 20px; }

        .zukan-tabs { display: flex; gap: 10px; margin-bottom: 20px; width: 100%; justify-content: center; }
        .zukan-tab-btn { padding: 12px 25px; background: #333; color: white; border: 2px solid #555; border-radius: 20px; cursor: pointer; font-size: 20px; font-weight: bold; transition: all 0.2s; }
        .zukan-tab-btn:hover, .zukan-tab-btn.active { background: #3498db; border-color: #2980b9; }
        #zukan-list { flex-grow: 1; width: 100%; overflow-y: auto; background: #111; border-radius: 15px; padding: 20px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; align-content: flex-start; }
        #zukan-list::-webkit-scrollbar { width: 12px; }
        #zukan-list::-webkit-scrollbar-track { background: #1a1a1a; border-radius: 6px; }
        #zukan-list::-webkit-scrollbar-thumb { background: #555; border-radius: 6px; }
        #zukan-list::-webkit-scrollbar-thumb:hover { background: #777; }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="ui-layer">
            <button id="nextPhaseBtn" class="phase-btn">次のフェイズへ</button>
            <button id="actionConfirmBtn">アクション確定</button>
            <button id="zukanBtn" onclick="openZukan()">📖 図鑑を見る</button>

            <div id="log" class="log-container"><div id="log-text"> ドローフェイズから開始します。</div></div>
            
            <div id="negotiation-modal" class="modal-base">
                <h2 id="neg-title" style="color:#f1c40f; font-size:36px; margin-bottom:20px;">⚖️ 厳正取引</h2>
                <div id="neg-display" style="background:#000; padding:25px; border-radius:15px; width:100%; text-align:center; font-size:24px; color:#eee;">要求を選んでください。</div>
                <div class="neg-buttons" id="neg-selections">
                    <button onclick="proposeDeal('HP6000')" class="neg-btn" style="background:#c0392b">🩸 HP 6000</button>
                    <button onclick="proposeDeal('HAND_SWAP')" class="neg-btn" style="background:#2980b9">🃏 手札強奪</button>
                    <button onclick="proposeDeal('STUN')" class="neg-btn" style="background:#f39c12; color:#000;">⚡ 1ターンスタン</button>
                </div>
                <div class="neg-buttons" id="neg-actions" style="display:none;">
                    <button onclick="playerAccept()" class="neg-btn" style="background:#27ae60">✅ 承諾</button>
                    <button onclick="playerRefuse()" class="neg-btn" style="background:#c0392b">❌ 拒否</button>
                </div>
            </div>

            <div id="iv-modal" class="modal-base">
                <h2 style="color:#e74c3c; font-size:36px; margin-bottom:10px;">💉 点滴のチャンス！</h2>
                <p style="font-size:22px; color:#eee; text-align:center;">手札に「点滴」があります。<br>攻撃済みの味方を再び行動可能にしますか？</p>
                <div style="margin-top:30px; display:flex; gap:20px;">
                    <button onclick="useIV()" style="padding:15px 40px; background:#2ecc71; border:none; border-radius:10px; color:#fff; font-size:22px; font-weight:bold; cursor:pointer;">使う</button>
                    <button onclick="skipIV()" style="padding:15px 40px; background:#95a5a6; border:none; border-radius:10px; color:#fff; font-size:22px; font-weight:bold; cursor:pointer;">使わずに終了</button>
                </div>
            </div>

            <div id="zukan-modal" class="modal-base">
                <h2 style="color:#3498db; font-size:42px; margin-top:0; margin-bottom: 20px;">📖 カード図鑑</h2>
                <div class="zukan-tabs" id="zukanTabsContainer">
                    <button class="zukan-tab-btn active" onclick="showZukanTab('All', this)">すべて</button>
                    <button class="zukan-tab-btn" onclick="showZukanTab('Monster', this)">モンスター</button>
                    <button class="zukan-tab-btn" onclick="showZukanTab('Magic', this)">マジック</button>
                    <button class="zukan-tab-btn" onclick="showZukanTab('Trap', this)">トラップ</button>
                    <button class="zukan-tab-btn" onclick="showZukanTab('Item', this)">アイテム(回復)</button>
                </div>
                <div id="zukan-list"></div>
                <button onclick="closeZukan()" class="neg-btn" style="background:#e74c3c; margin-top: 25px; padding: 15px 60px;">閉じる</button>
            </div>

            <div id="event-overlay">
                <div class="event-title">🌩️ NEUTRAL TURN</div>
                <p style="font-size: 24px;">天からカードが降り注ぐ！</p>
                <button id="endEventBtn" style="margin-top:30px; padding:15px 30px; font-size: 20px; cursor:pointer; border-radius: 10px; border: none; font-weight: bold; background:#fff; color:#000;">確認した</button>
            </div>

            <div id="result-overlay">
                <h1 id="result-title" style="font-size:120px; font-weight: bold; margin-bottom: 40px; color: #fff;"></h1>
                <button onclick="location.reload()" style="padding:25px 60px; font-size:32px; border-radius:20px; background:#3498db; color:white; border:none; cursor:pointer;">もう一度プレイ</button>
            </div>
        </div>
    </div>
</div>

<script type="module" src="main.js"></script>

</body>
</html>
